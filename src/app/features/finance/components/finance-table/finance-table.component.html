<div class="bg-white border border-gray-200 rounded-lg overflow-hidden shadow-sm">
    <!-- Table Content -->
    <div>
        <ng-container *ngFor="let group of data">
            <!-- Group Header (e.g., EINKOMMEN) -->
            <div
                class="flex items-center px-8 py-4 border-b border-gray-200 transition-all duration-150 bg-gradient-to-r from-gray-50 to-white font-semibold text-[15px] border-l-4 border-l-primary hover:from-gray-200 hover:to-gray-50 hover:shadow-[inset_0_0_0_1px_rgba(102,126,234,0.1)]">
                <div class="flex-1 flex items-center gap-4 cursor-pointer" (click)="toggleExpand(group)">
                    <svg class="w-4 h-4 text-primary transition-transform duration-300"
                        [class.rotate-180]="group.expanded" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                    <span class="tracking-wide text-slate-800">{{ group.description }}</span>
                    <button
                        class="p-1 rounded-full border border-indigo-100 bg-white cursor-pointer flex items-center justify-center text-primary transition-all duration-150 hover:bg-purple-50 hover:border-primary hover:scale-110">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
                <div class="w-[180px] text-right font-mono text-lg font-semibold text-primary">{{ group.amount |
                    number:'1.0-2' }}'</div>
                <div class="w-[140px] text-right text-gray-500 text-sm pr-6">{{ group.date }}</div>
                <div class="w-[100px] flex items-center justify-end gap-4">
                    <button
                        class="p-1.5 rounded-full border border-red-200 bg-white cursor-pointer flex items-center justify-center text-red-400 transition-all duration-150 hover:bg-red-100 hover:text-red-600 hover:border-red-300 hover:scale-110">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                    <input type="checkbox" class="w-[18px] h-[18px] cursor-pointer accent-primary">
                </div>
            </div>

            <!-- Group Children -->
            <div *ngIf="group.expanded" class="bg-gray-50">
                <div *ngFor="let item of group.children"
                    class="flex items-center px-8 py-4 border-b border-gray-200 transition-all duration-150 bg-white pl-20 border-l-4 border-l-transparent hover:bg-gray-50 hover:border-l-indigo-300">
                    <div class="flex-1 flex items-center gap-4">
                        <svg class="w-4 h-4 text-primary" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                        <span class="text-slate-600">{{ item.description }}</span>
                    </div>
                    <div class="w-[180px] text-right font-mono text-base font-semibold text-slate-800">{{ item.amount |
                        number:'1.0-2' }}</div>
                    <div class="w-[140px] text-right text-gray-500 text-sm pr-6">{{ item.date }}</div>
                    <div class="w-[100px] flex items-center justify-end gap-4">
                        <button
                            class="p-1.5 rounded-full border border-red-200 bg-white cursor-pointer flex items-center justify-center text-red-400 transition-all duration-150 hover:bg-red-100 hover:text-red-600 hover:border-red-300 hover:scale-110">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <line x1="18" y1="6" x2="6" y2="18"></line>
                                <line x1="6" y1="6" x2="18" y2="18"></line>
                            </svg>
                        </button>
                        <input type="checkbox" class="w-[18px] h-[18px] cursor-pointer accent-primary">
                    </div>
                </div>
            </div>
        </ng-container>
    </div>
</div>
