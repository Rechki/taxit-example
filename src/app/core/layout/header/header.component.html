<header class="h-16 bg-white border-b border-gray-200 flex items-center px-8 sticky top-0 z-10 shadow-sm">
    <div class="w-full flex justify-end">
        <div class="flex items-center gap-6">
            <!-- Notification Bell -->
            <button class="relative p-2 rounded-full hover:bg-gray-100 transition-colors duration-150">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    class="text-gray-600">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                </svg>
                <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
            </button>

            <!-- User Profile -->
            <div class="flex items-center gap-3 cursor-pointer group">
                <div
                    class="w-8 h-8 rounded-full overflow-hidden bg-gray-200 ring-2 ring-transparent group-hover:ring-primary transition-all duration-150">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=John" alt="User Avatar"
                        class="w-full h-full object-cover">
                </div>
                <span class="font-medium text-sm text-gray-700 group-hover:text-primary transition-colors">John
                    Smith</span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    class="text-gray-400 group-hover:text-primary transition-colors">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
            </div>
        </div>
    </div>
</header>
